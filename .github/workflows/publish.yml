name: Publish to npm

# Triggered on every vX.Y.Z tag push. Pair with the local release flow:
#   npm version patch|minor|major   # bumps package.json + creates a tag
#   git push origin main --tags     # pushes commit + tag -> triggers this job
#
# Requires a repo secret named NPM_TOKEN with publish permission. Create one
# with: `npm token create --read-and-publish` (prompts passkey once),
# then GitHub -> Settings -> Secrets and variables -> Actions -> New secret.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Verify tag matches package.json version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
